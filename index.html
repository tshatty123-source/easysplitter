<!DOCTYPE html>
<html lang="en">
<head>
  <title>Easy Splitter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top">
  <h1>Easy Splitter</h1>
</header>

<main>

<section class="card">
  <h2>Groups</h2>
  <button onclick="createGroup()">Create Group</button>
</section>

<section class="card">
  <h2>You are</h2>
  <input id="newUser" placeholder="Enter your name">
  <button onclick="addUser()">Add / Select</button>
  <select id="currentUser"></select>
</section>

<section class="card">
  <h2>Your UPI ID</h2>
  <input id="upiInput" placeholder="example@upi">
  <button onclick="saveUPI()">Save UPI</button>
</section>

<section class="card">
  <h2>Add Expense</h2>
  <input id="amount" type="number" placeholder="Amount">

  <select id="splitType">
    <option value="equal">Equal Split</option>
    <option value="smart">Smart AI Split</option>
  </select>

  <label>AI Strength</label>
  <input type="range" id="aiStrength" min="0" max="100" value="50">

  <button onclick="addExpense()">Add Expense</button>
  <pre id="aiExplain"></pre>
</section>

<section class="card">
  <h2>Balances</h2>
  <div id="balances"></div>
  <button class="small-btn" onclick="resetGroup()">Reset Group</button>
</section>

<section class="card">
  <h2>Settle Up</h2>
  <div id="settle"></div>
</section>

<section class="card">
  <h2>Confirm Payments</h2>
  <div id="confirmations"></div>
</section>

<section class="card">
  <h2>Invite Friends</h2>
  <button onclick="generateInvite()">Generate Invite Link</button>
  <button onclick="shareInvite()" class="small-btn">Share Invite</button>
  <pre id="inviteCode"></pre>
</section>

<section class="card">
  <h2>History</h2>
  <div id="history"></div>
</section>

</main>

<script src="script.js"></script>
</body>
</html>
