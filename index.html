<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Easy Splitter</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>💸 Easy Splitter</h1>
  <p class="tagline">
    A simple way to split group expenses,<br>
    track balances and settle smartly.
  </p>
</header>

<main>

<section class="card">
  <h2>👥 Create Group</h2>
  <input id="groupName" placeholder="Enter group name">
  <button onclick="createGroup()">Create Group</button>
</section>

<section class="card">
  <h2>🙋 Your Name</h2>
  <input id="newUser" placeholder="Enter your name">
  <button onclick="addUser()">Add / Select</button>
  <select id="currentUser"></select>
</section>

<section class="card">
  <h2>🏦 Your UPI ID</h2>
  <input id="upiInput" placeholder="example@upi">
  <button onclick="saveUPI()">Save UPI</button>
</section>

<section class="card">
  <h2>🧾 Add Expense</h2>
  <input id="amount" type="number" placeholder="Amount">
  <button onclick="addExpense()">Add Expense</button>
</section>

<section class="card">
  <h2>📊 Balances</h2>
  <div id="balances" class="list"></div>
</section>

<section class="card">
  <h2>💰 Who Needs to Pay</h2>
  <div id="settle" class="list"></div>
</section>

<section class="card">
  <h2>🔗 Invite Friends</h2>
  <button onclick="generateInvite()">Generate Invite Link</button>
  <button onclick="shareInvite()" class="secondary">Share</button>
  <pre id="inviteCode"></pre>
</section>

</main>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
