<!DOCTYPE html>
<html lang="en">
<head>
  <title>Easy Splitter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Easy Splitter</h1>
</header>

<main>

<section class="card">
  <h2>Group</h2>
  <button onclick="createGroup()">Create Group</button>
</section>

<section class="card">
  <h2>Your Name</h2>
  <input id="newUser" placeholder="Enter your name">
  <button onclick="addUser()">Add / Select</button>
  <select id="currentUser"></select>
</section>

<section class="card">
  <h2>Your UPI ID</h2>
  <input id="upiInput" placeholder="example@upi">
  <button onclick="saveUPI()">Save UPI</button>
</section>

<section class="card">
  <h2>Add Expense</h2>
  <input id="amount" type="number" placeholder="Amount">
  <select id="splitType">
    <option value="equal">Equal Split</option>
    <option value="smart">Smart AI Split</option>
  </select>
  <button onclick="addExpense()">Add Expense</button>
</section>

<section class="card">
  <h2>Balances</h2>
  <div id="balances"></div>
</section>

<section class="card">
  <h2>Settle Up</h2>
  <div id="settle"></div>
</section>

<section class="card">
  <h2>Invite Friends</h2>
  <button onclick="generateInvite()">Generate Invite Link</button>
  <button onclick="shareInvite()" class="small">Share Invite</button>
  <pre id="inviteCode"></pre>
</section>

</main>

<script src="script.js"></script>
</body>
</html>
